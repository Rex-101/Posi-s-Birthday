<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Scrapbook 🤎</title>

    <link rel="stylesheet" href="scrapbook.css" />
  </head>

  <body>
    <section class="scrapbook">
      <img src="assets/item-letter.png" class="item letter" />

      <img src="assets/item-camcorder.png" class="item videos" />

      <img src="assets/item-story.png" class="item story" />

      <img src="assets/item-voiceNotes.png" class="item voice" />

      <img src="assets/item-photos.jpg" class="item photos" />

      <img src="assets/item-calendar.png" class="item calendar" />

      <img src="assets/item-album.png" class="item album" />

      <img src="assets/item-music.png" class="item music" />
    </section>

    <div class="popup-overlay" id="popup">

    <div class="popup-window">

        <button class="close-btn">&times;</button>

        <div id="popupContent"></div>

    </div>

</div>

    <script src="scrapbook.js"></script>
  </body>
</html>
